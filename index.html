            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
        .animate-slide-up { animation: slideUp 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .ai-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            right: 20px;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid white;
        }
        .ai-bubble.thinking::after {
            border-top-color: #e2e8f0; /* bg-slate-200 */
        }
        .price-tag {
            background: linear-gradient(135deg, #0ea5e9, #2563eb);

        const T = TRANSLATIONS[state.currentLanguage];
        state.ai.message = T.ai_welcome;

        if (!API_KEY || API_KEY === "TUTAJ_WKLEJ_SWOJ_KLUCZ_API") {
            state.ai.message = T.ai_no_key;
            renderAIAssistant();
            return;
        }
        try {
            state.ai.instance = new GoogleGenAI({ apiKey: API_KEY });
            state.ai.isReady = true;
            console.log("Spöket G är redo att hjälpa!");
        } catch (error) {
            console.error("Fel vid initiering av Gemini:", error);
            state.ai.message = T.ai_error;
        }
        renderAIAssistant();
    };

    const setAIMessage = (text, isLoading = false) => {
        state.ai.isLoading = isLoading;
        if (!isLoading) {
            state.ai.message = text;
        }
        renderAIAssistant();
    };

    const getAITip = async (context, data) => {
        if (!state.ai.isReady || state.ai.isLoading) return;
        const T = TRANSLATIONS[state.currentLanguage];

        let prompt;
        switch(context) {
            case 'profile_selected':
                prompt = T.ai_prompt_profile(data.name, data.type);
                break;
            case 'product_added':
                if (data.count < 2) return;
                if (data.count === 5) {
                    prompt = T.ai_prompt_5_products;
                } else if (data.count === 10) {
                     prompt = T.ai_prompt_10_products;
                } else {
                    return;
                }
                break;
            case 'price_updated':
                const discountThreshold = state.currentLanguage === 'sv' ? 15000 : 3000;
                if (data.total > discountThreshold && state.totals.discount === 0) {
                     prompt = T.ai_prompt_discount(discountThreshold);
                } else {
                    return;
                }
                break;
            default:
                return;
        }
        
        setAIMessage("", true);
        try {
            const result = await state.ai.instance.models.generateContent({ model: "gemini-2.5-flash-preview-04-17", contents: prompt });
            setAIMessage(result.text);
        } catch (error) {
            console.error("Fel vid anrop till Gemini:", error);
            setAIMessage(T.ai_tip_error, false);
        }
    };

    // --- DOM Elements ---
    const profileSelectorContainer = document.getElementById('profile-selector');
    const productCarouselContainer = document.getElementById('product-carousel');
    const applicationFormSection = document.getElementById('application-form-section');
    const languageSwitcherContainer = document.getElementById('language-switcher');
    document.getElementById('current-year').textContent = new Date().getFullYear();
    emailjs.init("nkABopy-OhY0pGK5w");

    // --- RENDER FUNCTIONS ---
    
    const renderAll = () => {
        document.documentElement.lang = state.currentLanguage;
        renderStaticTexts();
        renderLanguageSwitcher();
        renderProfiles();
        renderProducts();
        renderApplicationForm();
        renderAIAssistant();
    }
    
    const renderStaticTexts = () => {
        const T = TRANSLATIONS[state.currentLanguage];
        document.getElementById('header-title').textContent = T.header_title;
        document.getElementById('header-subtitle').textContent = T.header_subtitle;
        document.getElementById('section-title-profile').textContent = T.section_title_profile;
        document.getElementById('section-title-product').textContent = T.section_title_product;
        document.getElementById('footer-text').textContent = T.footer_text;
    }

    const renderLanguageSwitcher = () => {
        languageSwitcherContainer.innerHTML = Object.keys(TRANSLATIONS).map(lang => {
            const isActive = state.currentLanguage === lang;
            return `
                <button 
                    data-lang="${lang}" 
                    class="lang-btn rounded-md transition-all duration-200 ${isActive ? 'ring-2 ring-blue-500' : 'opacity-60 hover:opacity-100'}"
                    aria-label="Byt till ${lang}"
                >
                    <div class="w-8 h-6 overflow-hidden rounded-md shadow-sm">
                        ${ICONS['flag_' + lang] || lang.toUpperCase()}
                    </div>
                </button>
            `;
        }).join('');

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const newLang = e.currentTarget.dataset.lang;
                if (state.currentLanguage !== newLang) {
                    state.currentLanguage = newLang;
                    renderAll();
                }
            });
        });
    }

    const renderAIAssistant = () => {
        aiMessageEl.textContent = state.ai.message;
        if (state.ai.isLoading) {
            aiMessageEl.classList.add('hidden');
            aiLoaderEl.classList.remove('hidden');
            aiLoaderEl.classList.add('flex');
        } else {
            aiMessageEl.classList.remove('hidden');
            aiLoaderEl.classList.add('hidden');
            aiLoaderEl.classList.remove('flex');
        }
    }

    const renderProfiles = () => {
        const T = TRANSLATIONS[state.currentLanguage];
        profileSelectorContainer.innerHTML = PROFILES.map(profile => `
            <div
              data-profile-name="${profile.name}"
              class="profile-card flex flex-col items-center p-5 bg-white rounded-xl border transition-all duration-300 ease-in-out cursor-pointer w-full max-w-[220px] hover:shadow-xl hover:scale-105 hover:border-blue-300 ${state.selectedProfile?.name === profile.name ? 'border-blue-500 shadow-lg scale-105' : 'border-slate-200 shadow-md'}"
              role="button" tabindex="0"
            >
              <img src="${profile.imageSrc}" alt="${profile.name}" class="w-32 h-32 object-contain mb-4" />
              <div class="text-center">
                  <p class="font-bold text-lg text-slate-800">${profile.name}</p>
                  <p class="text-sm text-slate-500 mb-4">(${profile.type})</p>
              </div>
              <a href="${profile.readMoreUrl}" target="_blank" rel="noopener noreferrer" class="read-more-link mt-auto inline-block px-5 py-2 bg-slate-100 text-slate-700 rounded-full text-xs font-semibold transition-colors duration-300 hover:bg-blue-600 hover:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                ${T.read_more}
              </a>
            </div>
        `).join('');

        document.querySelectorAll('.profile-card').forEach(card => {
            card.addEventListener('click', (e) => handleProfileSelect(e.currentTarget.dataset.profileName));
            card.querySelector('.read-more-link').addEventListener('click', e => e.stopPropagation());
        });
    };

    const renderProducts = () => {
        const T = TRANSLATIONS[state.currentLanguage];
        if (!state.selectedProfile) {
            productCarouselContainer.innerHTML = `<div class="w-full text-center p-8 text-slate-500 bg-slate-100 rounded-lg">${T.profile_select_prompt}</div>`;
            return;
        }

        const availableProducts = PRODUCTS.filter(p => p.availableFor.includes(state.selectedProfile.name));
        
        if (availableProducts.length === 0) {
            productCarouselContainer.innerHTML = `<div class="w-full text-center p-8 text-slate-500 bg-slate-100 rounded-lg">${T.no_products_prompt} ${state.selectedProfile.name}.</div>`;
            return;
        }

        productCarouselContainer.innerHTML = availableProducts.map(product => `
            <div
              data-product-name="${product.name}"

              role="button" tabindex="0"
            >
              <img src="${product.imageSrc}" alt="${product.name}" class="w-28 h-28 object-contain mb-3" />
              <p class="font-semibold text-center text-slate-700 text-sm">${product.name}</p>
              <div class="absolute top-3 right-3 bg-blue-600 text-white rounded-full w-8 h-8 flex items-center justify-center transition-all duration-300 group-hover:scale-110 group-hover:bg-blue-700 shadow-lg">
                ${ICONS.plus}
              </div>
            </div>
        `).join('');

        document.querySelectorAll('.product-card').forEach(card => {
            card.addEventListener('click', () => handleAddProduct(card.dataset.productName));
        });
    };

    const renderApplicationForm = () => {
        const T = TRANSLATIONS[state.currentLanguage];
        if (state.submissionStatus === 'success') {
            applicationFormSection.innerHTML = `
                <div class="text-center py-16 px-6 bg-teal-50 rounded-lg border-2 border-dashed border-teal-300 animate-fade-in">
                    ${ICONS.check}
                    <h3 class="mt-4 text-lg font-medium text-teal-800">${T.success_title}</h3>
                    <p class="mt-1 text-sm text-teal-600">${T.success_subtitle}</p>
                </div>`;
            return;
        }

        if (state.submissionStatus === 'error') {
            applicationFormSection.innerHTML = `
                <div class="text-center py-16 px-6 bg-red-50 rounded-lg border-2 border-dashed border-red-300 animate-fade-in">
                    ${ICONS.error}
                    <h3 class="mt-4 text-lg font-medium text-red-800">${T.error_title}</h3>
                    <p class="mt-1 text-sm text-red-600">${T.error_subtitle}</p>
                    <button id="try-again-btn" class="mt-4 px-5 py-2 bg-blue-600 text-white rounded-full text-sm font-semibold transition-colors duration-300 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">${T.button_try_again}</button>
                </div>`;
            document.getElementById('try-again-btn').addEventListener('click', () => {
                state.submissionStatus = 'idle';
                renderApplicationForm();
            });
            return;
        }

        if (state.formEntries.length === 0) {
            applicationFormSection.innerHTML = `
                <div class="text-center py-16 px-6 bg-slate-100 rounded-lg border-2 border-dashed border-slate-300">
                  ${ICONS.document}
                  <h3 class="mt-4 text-lg font-medium text-slate-700">${T.form_placeholder_title}</h3>
                  <p class="mt-1 text-sm text-slate-500">${T.form_placeholder_subtitle}</p>
                </div>`;
            return;
        }
        
        const entriesHTML = state.formEntries.map((entry, index) => renderProductEntry(entry, index)).join('');
        
        applicationFormSection.innerHTML = `
            <div class="max-w-5xl mx-auto">
              <div class="bg-white p-6 md:p-8 rounded-xl shadow-xl border border-slate-200">
                <h3 class="text-2xl font-bold mb-8 text-center text-slate-800 tracking-tight">${T.section_title_spec}</h3>
                <div id="product-entries-container" class="space-y-6 mb-10">${entriesHTML}</div>
                <div id="summary-section"></div>
                <div id="contact-form-container"></div>
              </div>
            </div>`;
        
        renderSummary();
        renderContactForm();
        
        document.querySelectorAll('.product-entry-item').forEach(item => {
            const entryId = parseInt(item.dataset.entryId);
            item.querySelector('.remove-entry-btn').addEventListener('click', () => handleRemoveEntry(entryId));
            item.querySelectorAll('input, select').forEach(input => {
                input.addEventListener('input', (e) => {
                    const { name, value, type } = e.target;
                    const isNumeric = type === 'number';
                    handleEntryChange(entryId, name, isNumeric ? (value === '' ? '' : Number(value)) : value);
                });
            });
            item.querySelectorAll('.dim-preset-btn').forEach(button => {
                button.addEventListener('click', (e) => {
                    handleDimensionPresetSelect(entryId, e.currentTarget.dataset.size);
                });
            });
        });

        document.getElementById('main-contact-form').addEventListener('submit', handleSubmit);
    };

    const updateEntryDOM = (entry) => {
        const T = TRANSLATIONS[state.currentLanguage];
        const entryElement = document.querySelector(`.product-entry-item[data-entry-id="${entry.id}"]`);
        if (!entryElement) return;

        const priceText = typeof entry.price === 'number' && entry.price > 0 ? `${entry.price.toFixed(2)} ${T.currency}` : (entry.price === 0 ? T.price_enter_dims : T.price_custom_size);
        const priceElement = entryElement.querySelector('.price-display');
        priceElement.textContent = priceText;

        if (typeof entry.price === 'number' && entry.price > 0) {
            priceElement.classList.remove('bg-slate-200', 'text-slate-600');
            priceElement.classList.add('price-tag', 'text-white');
        } else {
            priceElement.classList.remove('price-tag', 'text-white');
            priceElement.classList.add('bg-slate-200', 'text-slate-600');
        }
    }
    
    const renderSummary = () => {
        const T = TRANSLATIONS[state.currentLanguage];
        const summaryContainer = document.getElementById('summary-section');
        if(!summaryContainer) return;

        summaryContainer.innerHTML = `
            <div class="mt-10 text-right space-y-2 text-slate-700">
                <div class="text-lg">${T.label_subtotal} <span class="font-semibold">${state.totals.subtotal.toFixed(2)} ${T.currency}</span></div>
                <div class="text-lg text-red-600">${T.label_discount} <span class="font-semibold">-${state.totals.discount.toFixed(2)} ${T.currency}</span></div>
                <hr class="my-2 border-slate-200">
                <div class="text-2xl font-bold text-slate-900">${T.label_total} <span class="text-blue-600">${state.totals.final.toFixed(2)} ${T.currency}</span></div>
            </div>
        `;
    }
    
    const renderProductEntry = (entry, index) => {
        const T = TRANSLATIONS[state.currentLanguage];
        const price = typeof entry.price === 'number' && entry.price > 0 ? `${entry.price.toFixed(2)} ${T.currency}` : (entry.price === 0 ? T.price_enter_dims : T.price_custom_size);
        const priceColor = typeof entry.price === 'number' && entry.price > 0 ? 'text-white' : 'text-slate-600';
        const priceBg = typeof entry.price === 'number' && entry.price > 0 ? 'price-tag' : 'bg-slate-200';
        
        const commonSizesButtons = (entry.product.commonSizes || []).map(size => 
            `<button type="button" data-size="${size}" class="dim-preset-btn text-xs font-semibold px-3 py-1 bg-slate-200 text-slate-600 rounded-full hover:bg-blue-200 hover:text-blue-800 transition-colors">${size}</button>`
        ).join('');

        return `
            <div class="product-entry-item bg-slate-50 border border-slate-200/80 p-5 rounded-lg relative shadow-sm transition-shadow hover:shadow-md" data-entry-id="${entry.id}">
              <div class="grid grid-cols-1 md:grid-cols-[auto_1fr] gap-x-6 gap-y-4">
                <div class="flex items-start gap-4 row-span-1 md:row-span-3">
                    <img src="${entry.product.imageSrc}" alt="${entry.product.name}" class="w-20 h-20 object-contain rounded-md bg-white border border-slate-200" />
                    <div>
                      <h4 class="font-bold text-lg text-slate-800">${T.section} ${index + 1}</h4>
                      <p class="text-sm text-slate-500 font-medium">${entry.product.name}</p>
                      <p class="text-xs text-slate-500">${T.profile}: ${entry.profile.name}</p>
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 items-start">
                    <div class="flex flex-col"><label class="text-sm font-medium text-slate-600 mb-1.5">${T.label_width}</label><input type="number" name="width" value="${entry.width}" required placeholder="t.ex. 1200" class="p-2.5 bg-white border border-slate-300 rounded-md shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" /></div>
                    <div class="flex flex-col"><label class="text-sm font-medium text-slate-600 mb-1.5">${T.label_height}</label><input type="number" name="height" value="${entry.height}" required placeholder="t.ex. 1400" class="p-2.5 bg-white border border-slate-300 rounded-md shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" /></div>
                    <div class="flex flex-col"><label class="text-sm font-medium text-slate-600 mb-1.5">${T.label_quantity}</label><input type="number" name="quantity" value="${entry.quantity}" required min="1" class="p-2.5 bg-white border border-slate-300 rounded-md shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" /></div>
                    <div class="flex flex-col"><label class="text-sm font-medium text-slate-600 mb-1.5">${T.label_glass_type}</label><select name="glassType" class="styled-select p-2.5 bg-white border border-slate-300 rounded-md shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"><option value="2-glas" ${entry.glassType === '2-glas' ? 'selected' : ''}>${T.option_glass_2}</option><option value="3-glas" ${entry.glassType === '3-glas' ? 'selected' : ''}>${T.option_glass_3}</option></select></div>
                    <div class="flex flex-col"><label class="text-sm font-medium text-slate-600 mb-1.5">${T.label_ventilation_type}</label><select name="ventilationType" class="styled-select p-2.5 bg-white border border-slate-300 rounded-md shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"><option value="utan_ventilation" ${entry.ventilationType === 'utan_ventilation' ? 'selected' : ''}>${T.option_vent_no}</option><option value="med_ventilation" ${entry.ventilationType === 'med_ventilation' ? 'selected' : ''}>${T.option_vent_yes}</option></select></div>
                </div>
                <div class="md:col-start-2 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
                  <div class="sm:col-span-2 flex flex-wrap gap-2 items-center">
                    <span class="text-xs text-slate-500 font-medium mr-2">${T.label_common_sizes}</span>
                    ${commonSizesButtons}
                  </div>
                  <div class="col-span-1 sm:col-span-3 mt-2 md:text-right">
                      <span class="price-display inline-block px-4 py-2 rounded-lg font-bold transition-all duration-300 ${priceColor} ${priceBg}">${price}</span>
                  </div>
                </div>
              </div>
              <button class="remove-entry-btn absolute top-3 right-3 w-8 h-8 bg-slate-200/50 text-slate-500 rounded-full flex items-center justify-center hover:bg-red-100 hover:text-red-600 transition-colors" aria-label="Ta bort sektion ${index + 1}">
                ${ICONS.trash}
              </button>
            </div>
        `;
    };
    
    const renderContactForm = () => {
        const T = TRANSLATIONS[state.currentLanguage];
        const container = document.getElementById('contact-form-container');
        if (!container) return;
        
        container.innerHTML = `
            <form id="main-contact-form" class="mt-10 pt-10 border-t border-slate-200">
              <h3 class="text-2xl font-bold mb-8 text-center text-slate-800 tracking-tight">${T.section_title_contact}</h3>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5 mb-6">
                <div class="flex flex-col"><label for="firstName" class="mb-1.5 font-medium text-slate-700">${T.label_first_name}</label><input type="text" id="firstName" name="firstName" required class="p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 w-full transition shadow-sm" /></div>
                <div class="flex flex-col"><label for="lastName" class="mb-1.5 font-medium text-slate-700">${T.label_last_name}</label><input type="text" id="lastName" name="lastName" required class="p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 w-full transition shadow-sm" /></div>
                <div class="flex flex-col"><label for="email" class="mb-1.5 font-medium text-slate-700">${T.label_email}</label><input type="email" id="email" name="email" required class="p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 w-full transition shadow-sm" /></div>
                <div class="flex flex-col"><label for="phone" class="mb-1.5 font-medium text-slate-700">${T.label_phone}</label><input type="tel" id="phone" name="phone" required class="p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 w-full transition shadow-sm" /></div>
                <div class="md:col-span-2"><div class="flex flex-col"><label for="address" class="mb-1.5 font-medium text-slate-700">${T.label_address}</label><input type="text" id="address" name="address" required class="p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 w-full transition shadow-sm" /></div></div>
                <div class="md:col-span-2"><div class="flex flex-col"><label for="message" class="mb-1.5 font-medium text-slate-700">${T.label_message}</label><textarea id="message" name="message" rows="4" class="p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 w-full transition shadow-sm"></textarea></div></div>
              </div>
              <button id="submit-btn" type="submit" class="w-full bg-blue-600 text-white font-bold py-4 px-6 rounded-lg hover:bg-blue-700 transition-all duration-300 disabled:bg-slate-400 disabled:cursor-not-allowed flex items-center justify-center text-lg shadow-lg hover:shadow-xl focus:outline-none focus:ring-4 focus:ring-blue-300">
                ${ICONS.send} <span id="submit-btn-text">${T.button_submit}</span>
              </button>
            </form>
        `;
        document.getElementById('main-contact-form').addEventListener('submit', handleSubmit);
    };

    // --- EVENT HANDLERS & LOGIC ---
    const handleProfileSelect = (profileName) => {
        state.selectedProfile = PROFILES.find(p => p.name === profileName);
        state.formEntries = [];
        calculateTotals();
        renderProfiles();
        renderProducts();
        renderApplicationForm();
        getAITip('profile_selected', state.selectedProfile);
    };

    const handleAddProduct = (productName) => {
        const product = PRODUCTS.find(p => p.name === productName);
        const newEntry = {
            id: Date.now(),
            profile: state.selectedProfile,
            product,
            width: '', height: '', quantity: 1,
            glassType: '2-glas', ventilationType: 'utan_ventilation',
            price: 0,
        };
        state.formEntries.push(newEntry);
        renderApplicationForm();
        getAITip('product_added', { count: state.formEntries.length });
    };

    const handleRemoveEntry = (id) => {
        state.formEntries = state.formEntries.filter(entry => entry.id !== id);
        calculateTotals();
        renderApplicationForm();
    };

    const handleEntryChange = (id, field, value) => {
        const entry = state.formEntries.find(e => e.id === id);
        if (entry) {
            entry[field] = value;
            entry.price = calculateEntryPrice(entry);
            calculateTotals();
            // --- FOCUS FIX: ONLY UPDATE DOM, DON'T RE-RENDER ---
            updateEntryDOM(entry);
            renderSummary();
        }
    };
    
    const handleDimensionPresetSelect = (entryId, sizeString) => {
        const entry = state.formEntries.find(e => e.id === entryId);
        if (entry) {
            const [width, height] = sizeString.split('x').map(Number);
            entry.width = width;
            entry.height = height;

            // --- FOCUS FIX: Update inputs and then do targeted DOM update ---
            const entryElement = document.querySelector(`.product-entry-item[data-entry-id="${entry.id}"]`);
            entryElement.querySelector('input[name="width"]').value = width;
            entryElement.querySelector('input[name="height"]').value = height;
            
            entry.price = calculateEntryPrice(entry);
            calculateTotals();
            updateEntryDOM(entry);
            renderSummary();
        }
    };

    const calculateEntryPrice = (entry) => {
        if (!entry.width || !entry.height || !entry.quantity) {
            return 0;
        }

        const rules = PRICING_RULES[entry.product.name] || PRICING_RULES.default;
        const sqM = (entry.width / 1000) * (entry.height / 1000);
        
        if (sqM < rules.minSqM || sqM > rules.maxSqM) {
            return 'Anpassat mått';
        }

        const sizeRange = rules.maxSqM - rules.minSqM;
        const priceRange = rules.maxPrice - rules.minPrice;
        const sizeProgress = sizeRange === 0 ? 1 : (sqM - rules.minSqM) / sizeRange;
        let price = rules.minPrice + (sizeProgress * priceRange);

        price *= rules.profileMultipliers[entry.profile.name] || 1;
        if (entry.glassType === '3-glas') price += rules.options['3-glas'] || 0;
        if (entry.ventilationType === 'med_ventilation') price += rules.options['med_ventilation'] || 0;
        
        return price * entry.quantity;
    };
    
    const calculateTotals = () => {
        let subtotal = 0;
        let totalQuantity = 0;
        
        state.formEntries.forEach(entry => {
            if (typeof entry.price === 'number') {
                subtotal += entry.price;
            }
            totalQuantity += Number(entry.quantity) || 0;
        });

        state.totals.subtotal = subtotal;
        
        const discountThreshold = state.currentLanguage === 'sv' ? 15000 : 3000;
        let discount = 0;
        if (subtotal > discountThreshold) {
            discount = subtotal * 0.05;
        }
        
        state.totals.discount = discount;
        state.totals.final = subtotal - discount;
        
        getAITip('price_updated', { total: state.totals.subtotal });
    };

    const buildEmailContent = () => {
        const T = TRANSLATIONS[state.currentLanguage];
        const contactForm = document.getElementById('main-contact-form');
        const formData = new FormData(contactForm);

        const productRows = state.formEntries.map((entry, index) => {
            const price = typeof entry.price === 'number' ? `${entry.price.toFixed(2)} ${T.currency}` : entry.price;
            return `
                <tr style="border-bottom: 1px solid #e2e8f0; ${index % 2 === 0 ? 'background-color: #f8fafc;' : ''}">
                    <td style="padding: 12px; text-align: center;">${index + 1}</td>
                    <td style="padding: 12px;"><img src="${entry.product.imageSrc}" alt="${entry.product.name}" style="width: 50px; height: 50px; object-fit: contain; border-radius: 4px;"></td>
                    <td style="padding: 12px;">
                        <strong style="color: #1e293b;">${entry.product.name}</strong><br>
                        <span style="font-size: 12px; color: #64748b;">${T.profile}: ${entry.profile.name}</span>
                    </td>
                    <td style="padding: 12px;">${entry.width} mm x ${entry.height} mm</td>
                    <td style="padding: 12px; text-align: center;">${entry.quantity}</td>
                    <td style="padding: 12px;">${entry.glassType === '3-glas' ? T.option_glass_3 : T.option_glass_2}</td>
                    <td style="padding: 12px;">${entry.ventilationType === 'med_ventilation' ? T.option_vent_yes : T.option_vent_no}</td>
                    <td style="padding: 12px; text-align: right; font-weight: 600;">${price}</td>
                </tr>
            `;
        }).join('');

        const summaryRows = `
            <tr style="border-top: 2px solid #cbd5e1;">
                <td colspan="7" style="padding: 10px; text-align: right;">${T.label_subtotal}</td>
                <td style="padding: 10px; text-align: right; font-weight: 600;">${state.totals.subtotal.toFixed(2)} ${T.currency}</td>
            </tr>
            <tr>
                <td colspan="7" style="padding: 10px; text-align: right; color: #dc2626;">${T.label_discount}</td>
                <td style="padding: 10px; text-align: right; font-weight: 600; color: #dc2626;">-${state.totals.discount.toFixed(2)} ${T.currency}</td>
            </tr>
            <tr style="background-color: #f1f5f9; font-size: 1.1em;">
                <td colspan="7" style="padding: 12px; text-align: right; font-weight: 700;">${T.label_total}</td>
                <td style="padding: 12px; text-align: right; font-weight: 700; color: #2563eb;">${state.totals.final.toFixed(2)} ${T.currency}</td>
            </tr>
        `;

        return `
            <div style="font-family: 'Poppins', sans-serif; color: #334155; max-width: 800px; margin: auto; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden;">
                <div style="background-color: #1e293b; color: white; padding: 20px;">
                    <h1 style="margin: 0; font-size: 24px;">${T.email_title}</h1>
                </div>
                <div style="padding: 20px;">
                    <h2 style="font-size: 18px; color: #1e293b; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 20px;">${T.email_section_products}</h2>
                    <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
                        <thead style="background-color: #f1f5f9; text-align: left;">
                            <tr>
                                <th style="padding: 12px; text-align: center;">${T.email_header_index}</th>
                                <th style="padding: 12px;"></th>
                                <th style="padding: 12px;">${T.email_header_product}</th>
                                <th style="padding: 12px;">${T.email_header_dims}</th>
                                <th style="padding: 12px; text-align: center;">${T.email_header_quantity}</th>
                                <th style="padding: 12px;">${T.email_header_glass}</th>
                                <th style="padding: 12px;">${T.email_header_vent}</th>
                                <th style="padding: 12px; text-align: right;">${T.email_header_price}</th>
                            </tr>
                        </thead>
                        <tbody>${productRows}</tbody>
                        <tfoot>${summaryRows}</tfoot>
                    </table>
                    <h2 style="font-size: 18px; color: #1e293b; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-top: 30px; margin-bottom: 20px;">${T.email_section_customer}</h2>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px 20px; font-size: 14px;">
                        <div><strong>${T.email_label_name}:</strong><br>${formData.get('firstName')} ${formData.get('lastName')}</div>
                        <div><strong>${T.email_label_email}:</strong><br><a href="mailto:${formData.get('email')}" style="color: #2563eb;">${formData.get('email')}</a></div>
                        <div><strong>${T.email_label_phone}:</strong><br>${formData.get('phone')}</div>
                        <div><strong>${T.email_label_address}:</strong><br>${formData.get('address')}</div>
                    </div>
                    <div style="margin-top: 20px; font-size: 14px;">
                        <strong>${T.email_label_message}:</strong><br>
                        <p style="background-color: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 6px; margin-top: 5px; white-space: pre-wrap;">${formData.get('message') || T.email_no_message}</p>
                    </div>
                </div>
                <div style="background-color: #f8fafc; color: #64748b; padding: 15px; text-align: center; font-size: 12px; border-top: 1px solid #e2e8f0;">
                    ${T.email_footer}
                </div>
            </div>
        `;
    };

    const handleSubmit = (e) => {
        e.preventDefault();
        if (state.submissionStatus === 'sending') return;
        const T = TRANSLATIONS[state.currentLanguage];

        const submitBtn = document.getElementById('submit-btn');
        const submitBtnText = document.getElementById('submit-btn-text');
        state.submissionStatus = 'sending';
        submitBtn.disabled = true;
        submitBtn.innerHTML = `${ICONS.spinner} <span>${T.button_sending}</span>`;

        const contactForm = document.getElementById('main-contact-form');
        const formData = new FormData(contactForm);
        const formObject = Object.fromEntries(formData.entries());

        const emailContent = buildEmailContent();
        
        const emailParams = {
            to_email: "info@housefactors.se",
            from_name: `${formObject.firstName} ${formObject.lastName}`,
            reply_to: formObject.email,
            selected_products: emailContent
        };
        
        emailjs.send("service_3p2lhzg", "template_2822udm", emailParams)
            .then(function(response) {
                console.log('SUCCESS!', response.status, response.text);
                state.submissionStatus = 'success';
                state.formEntries = [];
                state.selectedProfile = null;
                calculateTotals();
                renderAll();
            }, function(error) {
                console.log('FAILED...', error);
                state.submissionStatus = 'error';
                renderApplicationForm();
            });
    };

    // --- INITIAL RENDER ---
    document.addEventListener('DOMContentLoaded', () => {
        initializeAI();
        renderAll();
    });

</script>

</body>
</html>
