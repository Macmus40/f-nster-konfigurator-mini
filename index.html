
<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Housefactors Edge | Pure Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@700;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --hf-gold: #C5A059;
            --hf-gold-dim: rgba(197, 160, 89, 0.15);
            
            /* Default Dark Theme */
            --bg-main: #121212;
            --bg-card: #1c1c1c;
            --bg-sidebar: #000000;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border-color: #2d2d2d;
            --input-bg: rgba(255,255,255,0.03);
            --bg-subtle: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(28, 28, 28, 0.95);
        }
        
        /* Light Theme Overrides */
        html[data-theme="light"] {
            --bg-main: #f5f5f5;
            --bg-card: #ffffff;
            --bg-sidebar: #ffffff;
            --text-main: #121212;
            --text-muted: #4b5563;
            --border-color: #e5e7eb;
            --input-bg: rgba(0,0,0,0.02);
            --bg-subtle: rgba(0, 0, 0, 0.05);
            --glass-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            font-size: 1rem;
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
            width: 100%;
        }
        .font-montserrat { font-family: 'Montserrat', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Premium Button */
        .btn-gold {
            background-color: var(--hf-gold);
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid var(--hf-gold);
            padding: 1rem 2rem;
        }
        .btn-gold:hover {
            background-color: transparent;
            color: var(--hf-gold);
            box-shadow: 0 0 30px var(--hf-gold-dim);
        }

        /* Refined Tech Card */
        .tech-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            position: relative;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .tech-card:hover {
            border-color: var(--hf-gold);
            background: var(--bg-card);
            opacity: 0.95;
        }
        .tech-card.selected {
            border-color: var(--hf-gold);
            background: var(--bg-card);
            transform: scale(1.005);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1), 0 0 25px var(--hf-gold-dim);
        }
        html[data-theme="dark"] .tech-card.selected {
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 25px var(--hf-gold-dim);
        }

        /* Specific light background for products in Step 2 */
        html[data-theme="dark"] #step-02 .tech-card {
            background: #9ca3af;
            color: #000000;
        }
        html[data-theme="dark"] #step-02 .tech-card p {
            color: #000000;
        }
        html[data-theme="dark"] #step-02 .tech-card.selected {
            background: #9ca3af;
            border-color: var(--hf-gold);
        }

        /* Spec Boxes */
        .spec-item {
            background: rgba(128,128,128,0.05);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 4px;
        }
        .selected .spec-item {
            border-color: var(--hf-gold-dim);
            background: rgba(197, 160, 89, 0.05);
        }

        /* Sidebar Icons */
        .side-nav-icon {
            width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); transition: all 0.4s;
            cursor: pointer;
        }
        .side-nav-icon.active {
            color: var(--hf-gold);
        }

        /* Modern Inputs */
        .tech-input {
            background: var(--input-bg);
            border-bottom: 2px solid var(--border-color);
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            padding: 0.75rem;
            width: 100%;
            transition: all 0.3s;
        }
        .tech-input:focus {
            outline: none;
            border-bottom-color: var(--hf-gold);
            background: rgba(128,128,128,0.05);
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
        }

        option {
            background: var(--bg-card);
            color: var(--text-main);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reveal { animation: fadeInUp 0.5s ease-out forwards; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-sidebar); }
        ::-webkit-scrollbar-thumb { background: var(--hf-gold); border-radius: 10px; }
    </style>
<script type="importmap">
{
  "imports": {

</head>
